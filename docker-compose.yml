version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixel_movies
      POSTGRES_USER: pixel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pixelmovies123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixel -d pixel_movies"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://pixel:${DB_PASSWORD:-pixelmovies123}@db:5432/pixel_movies
      REDIS_URL: redis://redis:6379/0
      TMDB_API_KEY: ${TMDB_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-me}
      SECRET_KEY: ${SECRET_KEY:-super-secret-app-key-change-me}
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3000},http://localhost
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # React Frontend (Nginx)
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
